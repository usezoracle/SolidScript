openapi: 3.0.3
info:
  title: SolidScript browser-deploy HTTP API
  description: |
    Local HTTP server started by `solidscript deploy --browser` to bridge the
    CLI to a browser-extension wallet (MetaMask, Rabby, Coinbase Wallet). The
    CLI starts this server on `localhost:7654`, opens a browser tab, and waits
    for the user to sign the deploy transaction in their wallet. The page
    POSTs the resulting tx hash back to the CLI.

    Lifecycle:
      1. CLI starts the server, opens http://127.0.0.1:7654/ in default browser
      2. Browser GETs `/` (HTML), GETs `/params` (deploy data), prompts wallet
      3. User signs in extension, browser POSTs `/result` with tx hash
      4. CLI shuts down the server and waits for the tx receipt
  version: 0.1.0
  license:
    name: MIT
servers:
  - url: http://127.0.0.1:7654
    description: Local browser-deploy bridge (single-use per deploy)
paths:
  /:
    get:
      summary: Browser wallet UI
      description: HTML page rendered to the user for wallet connection and deploy signing.
      responses:
        "200":
          description: HTML page
          content:
            text/html:
              schema:
                type: string
  /params:
    get:
      summary: Get deploy transaction parameters
      description: Returns the contract metadata and pre-encoded deploy transaction data that the page will pass to the user's wallet.
      responses:
        "200":
          description: Deploy parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeployParams"
              example:
                contractName: MyToken
                networkName: Base Sepolia
                chainIdHex: "0x14a34"
                networkAdd:
                  chainId: "0x14a34"
                  chainName: Base Sepolia
                  nativeCurrency: { name: ETH, symbol: ETH, decimals: 18 }
                  rpcUrls: ["https://sepolia.base.org"]
                  blockExplorerUrls: ["https://sepolia.basescan.org"]
                deployData: "0x608060405234801561..."
  /result:
    post:
      summary: Submit deploy result
      description: |
        Called by the browser page once the wallet has either signed the tx
        (success) or thrown an error (rejection / chain switch failure / no
        injected wallet).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/DeploySuccess"
                - $ref: "#/components/schemas/DeployFailure"
            examples:
              success:
                value:
                  txHash: "0x3e5e424c0181b5768c46cfb0726d7ca4aa89ef9d0bad3a0712dfc6632045f5b4"
                  from: "0x27cee32550dcc30de5a23551baf7de2f3b0b98a0"
              failure:
                value:
                  error: "user rejected request"
      responses:
        "200":
          description: Acknowledged
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
components:
  schemas:
    DeployParams:
      type: object
      required: [contractName, networkName, chainIdHex, networkAdd, deployData]
      properties:
        contractName:
          type: string
          example: MyToken
        networkName:
          type: string
          example: Base Sepolia
        chainIdHex:
          type: string
          pattern: "^0x[0-9a-fA-F]+$"
          description: Target chain ID in hex (passed to wallet_switchEthereumChain)
        networkAdd:
          $ref: "#/components/schemas/AddEthereumChainParameter"
        deployData:
          type: string
          pattern: "^0x[0-9a-fA-F]+$"
          description: |
            ABI-encoded constructor call appended to the contract creation
            bytecode. Passed as `data` in `eth_sendTransaction`.
    AddEthereumChainParameter:
      type: object
      description: EIP-3085 — wallet_addEthereumChain parameters
      required: [chainId, chainName, nativeCurrency, rpcUrls]
      properties:
        chainId: { type: string }
        chainName: { type: string }
        nativeCurrency:
          type: object
          properties:
            name: { type: string }
            symbol: { type: string }
            decimals: { type: integer }
        rpcUrls: { type: array, items: { type: string, format: uri } }
        blockExplorerUrls: { type: array, items: { type: string, format: uri } }
    DeploySuccess:
      type: object
      required: [txHash, from]
      properties:
        txHash:
          type: string
          pattern: "^0x[0-9a-fA-F]{64}$"
        from:
          type: string
          pattern: "^0x[0-9a-fA-F]{40}$"
    DeployFailure:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: "user rejected request"
