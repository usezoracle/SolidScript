name: Bug report
description: Something in SolidScript isn't working as documented
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The more reproducible the report, the faster we can fix it.
  - type: input
    id: version
    attributes:
      label: SolidScript version
      description: "Output of `solidscript --version` (e.g. 0.2.1)"
      placeholder: "0.2.1"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: "Output of `node --version`"
      placeholder: "v20.10.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (arm64)
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: |
        Minimal steps to reproduce. Include a minimal `.ts` contract that triggers it if relevant.
      placeholder: |
        1. Create `contracts/Foo.ts` with:
           ```ts
           …
           ```
        2. Run `solidscript build contracts`
        3. Observe error: …
      render: markdown
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: solidscript doctor output
      description: Paste the output of `solidscript doctor` so we can see your toolchain state.
      render: shell
    validations:
      required: false
