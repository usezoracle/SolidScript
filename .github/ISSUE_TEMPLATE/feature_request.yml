name: Feature request
description: Suggest a new capability or improvement
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the situation where the current SolidScript falls short?
      placeholder: "When I do X, I have to manually Y because SolidScript doesn't support Z…"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like SolidScript to do?
      placeholder: "A new decorator `@foo` that emits …, or a new CLI flag `--bar` that …"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're worse.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Transpiler (TS → Solidity emit)
        - Optimizer pass
        - Validator rule
        - Security pipeline (new gate or analyzer)
        - Deploy / wallet / verification
        - CLI / DX
        - Docs / examples
        - Library API
        - Other
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else — links, prior art, related issues.
    validations:
      required: false
